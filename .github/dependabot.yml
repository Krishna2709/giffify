version: 2

# Keep the GitHub Actions used by our workflows (ci.yml, release.yml,
# codeql.yml) up to date. Dependabot opens PRs that bump the pinned action
# SHAs and refresh the accompanying version comment.
#
# NOTE: there is deliberately no "pip" (or any language-package) ecosystem
# here. The project is standard-library only by specification (spec §6.2): the
# core runtime has zero third-party runtime dependencies, so there is no
# requirements.txt / locked dependency set for Dependabot to track. This
# omission is intentional, not an oversight.
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    # github/codeql-action/init and github/codeql-action/analyze are separate
    # action paths in the same repository, but CodeQL requires both to run the
    # SAME version: analyze reads the configuration init wrote, and a mismatch
    # fails the run with "Loaded a configuration file for version X, but
    # running version Y". Ungrouped, Dependabot opens one PR per path, each
    # bumping only half the pair, so both PRs fail by construction. Grouping
    # them means a single PR bumps init and analyze together.
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action*"
