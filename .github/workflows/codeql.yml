name: CodeQL

# Static analysis for the Python engine (stdlib-only) and tooling. The tree is
# small, so nothing is excluded from analysis.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Mondays 07:00 UTC, to catch newly disclosed query patterns.
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload CodeQL results to the Security tab
      contents: read

    steps:
      # Supply-chain hygiene: official actions only, pinned to full commit SHAs.
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
